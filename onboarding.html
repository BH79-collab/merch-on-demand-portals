// ── Fetch products from Shopify Storefront API ────────────────────────────────
async function fetchShopifyProducts(){
  var SF="shop-merch-on-demand.myshopify.com";
  var ST="476072d25cd5d3ad49aa12975d4017f2";
  var query="{products(first:50){edges{node{id title handle productType images(first:1){edges{node{url}}} options{name values} variants(first:100){edges{node{id title selectedOptions{name value}}}}}}}}";
  var res=await fetch("https://"+SF+"/api/2024-01/graphql.json",{
    method:"POST",
    headers:{"Content-Type":"application/json","X-Shopify-Storefront-Access-Token":ST},
    body:JSON.stringify({query:query})
  });
  if(!res.ok)throw new Error("Storefront error "+res.status);
  var json=await res.json();
  if(json.errors)throw new Error(json.errors[0].message||"GraphQL error");
  return (json.data&&json.data.products&&json.data.products.edges||[]).map(function(e){
    var p=e.node;
    var colourMap={};var sizeSet=[];
    p.variants.edges.map(function(e){return e.node;}).forEach(function(v){
      v.selectedOptions.forEach(function(opt){
        if(/colou?r/i.test(opt.name))colourMap[opt.value]=1;
        if(/size/i.test(opt.name)&&sizeSet.indexOf(opt.value)===-1)sizeSet.push(opt.value);
      });
    });
    (p.options||[]).forEach(function(opt){
      if(/colou?r/i.test(opt.name))opt.values.forEach(function(v){colourMap[v]=1;});
      if(/size/i.test(opt.name))opt.values.forEach(function(v){if(sizeSet.indexOf(v)===-1)sizeSet.push(v);});
    });
    return{id:p.id,handle:p.handle,name:p.title,category:p.productType||"",
      image:p.images.edges[0]&&p.images.edges[0].node&&p.images.edges[0].node.url||null,
      colours:Object.keys(colourMap),sizes:sizeSet};
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const readImg=f=>new Promise(r=>{const fr=new FileReader();fr.onload=e=>r(e.target.result);fr.readAsDataURL(f);});

// ── Atoms ─────────────────────────────────────────────────────────────────────
function Spin(){return <span style={{display:"inline-block",width:14,height:14,border:"2px solid rgba(26,23,20,0.15)",borderTopColor:T.ink,borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>;}

function Label({c,req}){return <label style={{display:"block",fontSize:11,fontWeight:700,color:T.mut,textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:6}}>{c}{req&&<span style={{color:T.acc,marginLeft:3}}>*</span>}</label>;}

function Inp({label,req,val,set,ph,type="text",hint,mono}){
  return(<div style={{marginBottom:18}}>
    {label&&<Label c={label} req={req}/>}
    <input type={type} value={val||""} onChange={e=>set(e.target.value)} placeholder={ph}
      style={{width:"100%",padding:"11px 14px",background:T.sur,border:`1.5px solid ${T.bdr}`,borderRadius:10,fontSize:mono?12:14,color:T.ink,fontFamily:mono?"monospace":"inherit",outline:"none",boxSizing:"border-box"}}
      onFocus={e=>e.target.style.borderColor=T.acc} onBlur={e=>e.target.style.borderColor=T.bdr}/>
    {hint&&<p style={{color:T.mut,fontSize:11,marginTop:4}}>{hint}</p>}

}

function Sel({label,req,val,set,opts}){

      <option value="">Select…</option>
      {opts.map(o=><option key={o} value={o}>{o}</option>)}

}

function PBar({step}){

      {STEPS.map((s,i)=>{
        const done=i<idx,cur=i===idx;
        return(<div key={s.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
          <div style={{width:26,height:26,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:10,fontWeight:700,background:done?T.acc:cur?T.ink:T.fnt,color:done||cur?"white":T.mut,border:`2px solid ${done?T.acc:cur?T.ink:T.bdr}`}}>

          <span style={{fontSize:8,fontWeight:700,color:cur?T.ink:T.mut,textTransform:"uppercase",letterSpacing:"0.05em"}}>{s.label}</span>

    </div>
    <div style={{height:3,background:T.bdr,borderRadius:99,overflow:"hidden"}}>
      <div style={{height:3,width:`${pct}%`,background:T.acc,borderRadius:99,transition:"width 0.4s ease"}}/>
    </div>

}

function SHdr({title,sub}){

// ── PRODUCT DESIGN SLOT ───────────────────────────────────────────────────────
function DesignSlot({num,total,planMax,design,onChange,products,loadingProducts}){
  const[showGrid,setShowGrid]=useState(!design?.productId);
  const frontRef=useRef();
  const backRef=useRef();
  const svgRef=useRef();

  const d=design||{productId:"",colours:[],sizes:[],frontLogo:null,backLogo:null,frontPl:null,backPl:null,notes:""};
  const prod=products.find(p=>p.id===d.productId);
  const upd=patch=>onChange({...d,...patch});

  const handleLogo=async(file,side)=>{
    if(!file?.type.startsWith("image/"))return;
    const url=await readImg(file);
    upd({[side+"Logo"]:{name:file.name,url},[side+"Pl"]:null});
  };

  // Drag/resize state
  const drag=useRef(null);
  const resize=useRef(null);

  const pz=(side)=>side==="front"?{x:62,y:55,w:76,h:90}:{x:62,y:50,w:76,h:90};

  const getScale=()=>{
    if(!svgRef.current)return{sx:1,sy:1};
    const r=svgRef.current.getBoundingClientRect();
    return{sx:r.width/200,sy:r.height/220};
  };

  const startDrag=(e,side)=>{
    e.preventDefault();e.stopPropagation();
    const pl=d[side+"Pl"]||defPl(side);
    const{sx,sy}=getScale();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    drag.current={side,pl,mx:cx,my:cy,lx:pl.x*sx,ly:pl.y*sy};
    const z=pz(side);
    const move=ev=>{
      if(!drag.current)return;
      const ex=ev.touches?ev.touches[0].clientX:ev.clientX;
      const ey=ev.touches?ev.touches[0].clientY:ev.clientY;
      const{sx:sx2,sy:sy2}=getScale();
      let nx=(drag.current.lx+(ex-drag.current.mx))/sx2;
      let ny=(drag.current.ly+(ey-drag.current.my))/sy2;
      nx=Math.max(z.x,Math.min(z.x+z.w-pl.w,nx));
      ny=Math.max(z.y,Math.min(z.y+z.h-pl.h,ny));
      upd({[side+"Pl"]:{...pl,x:nx,y:ny}});
    };
    const up=()=>{drag.current=null;window.removeEventListener("mousemove",move);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",move);window.removeEventListener("touchend",up);};
    window.addEventListener("mousemove",move);window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",move,{passive:false});window.addEventListener("touchend",up);
  };

  const startResize=(e,side)=>{
    e.preventDefault();e.stopPropagation();
    const pl=d[side+"Pl"]||defPl(side);
    const{sx}=getScale();
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    resize.current={side,pl,mx:cx,lw:pl.w*sx};
    const z=pz(side);
    const move=ev=>{
      if(!resize.current)return;
      const ex=ev.touches?ev.touches[0].clientX:ev.clientX;
      const{sx:sx2}=getScale();
      let nw=(resize.current.lw+(ex-resize.current.mx))/sx2;
      nw=Math.max(10,Math.min(z.x+z.w-pl.x,nw));
      upd({[side+"Pl"]:{...pl,w:nw,h:nw*(pl.h/pl.w)}});
    };
    const up=()=>{resize.current=null;window.removeEventListener("mousemove",move);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",move);window.removeEventListener("touchend",up);};
    window.addEventListener("mousemove",move);window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",move,{passive:false});window.addEventListener("touchend",up);
  };

  const defPl=side=>{const z=pz(side);return{x:z.x+z.w*0.15,y:z.y+z.h*0.15,w:z.w*0.7,h:z.h*0.7};};

  const canvas=(side)=>{
    const logo=d[side+"Logo"];
    const pl=d[side+"Pl"]||defPl(side);
    const z=pz(side);
    const isHood=prod?.category?.toLowerCase().includes("hood");
    const isCap=prod?.category?.toLowerCase().includes("cap")||prod?.name?.toLowerCase().includes("cap");
    if(isCap&&side==="back")return null;
    const colour="#888888"; // neutral grey for preview
    const bodyPath="M55,20 L30,45 L5,38 L18,80 L40,75 L40,205 L160,205 L160,75 L182,80 L195,38 L170,45 L145,20 C140,28 130,35 100,35 C70,35 60,28 55,20 Z";
    return(
      <div key={side} style={{flex:1,background:T.sur,border:`1.5px solid ${T.bdr}`,borderRadius:12,padding:10}}>
        <p style={{textAlign:"center",fontSize:9,fontWeight:700,color:T.mut,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:4}}>{side==="front"?"FRONT":"BACK"}</p>
        {!logo&&<p style={{textAlign:"center",fontSize:10,color:T.acc,marginBottom:3}}>👆 Click garment to upload</p>}
        <svg ref={side==="front"?svgRef:null} viewBox="0 0 200 220" style={{width:"100%",display:"block",cursor:"pointer"}}
          onClick={()=>{if(!logo){side==="front"?frontRef.current?.click():backRef.current?.click();}}}>
          <ellipse cx="100" cy="215" rx="70" ry="6" fill="rgba(0,0,0,0.06)"/>
          {isCap?(
            <>
              <path d="M20,115 Q60,140 140,115 Q170,130 180,125 Q160,145 20,130 Z" fill="#888" stroke="#ccc" strokeWidth="1"/>
              <path d="M30,110 Q50,45 100,40 Q150,45 170,110 Q130,125 70,125 Z" fill="#888" stroke="#ccc" strokeWidth="1.5"/>
              <line x1="100" y1="40" x2="100" y2="115" stroke="rgba(0,0,0,0.07)" strokeWidth="1"/>
              <circle cx="100" cy="42" r="4" fill="rgba(0,0,0,0.15)"/>
            </>
          ):(
            <>
              <path d={bodyPath} fill="#888" stroke="#ccc" strokeWidth="1.5"/>
              <path d="M55,20 C60,28 70,35 100,35 C130,35 140,28 145,20" fill="none" stroke="#ccc" strokeWidth="2"/>
              {isHood&&<path d="M50,22 C45,10 65,2 100,2 C135,2 155,10 150,22 C145,15 130,8 100,8 C70,8 55,15 50,22 Z" fill="#888" stroke="rgba(0,0,0,0.1)" strokeWidth="1"/>}
              {isHood&&side==="front"&&<rect x="65" y="155" width="70" height="40" rx="4" fill="rgba(0,0,0,0.08)"/>}
              <line x1="40" y1="75" x2="40" y2="205" stroke="rgba(0,0,0,0.06)" strokeWidth="1"/>
              <line x1="160" y1="75" x2="160" y2="205" stroke="rgba(0,0,0,0.06)" strokeWidth="1"/>
            </>
          )}
          <rect x={z.x} y={z.y} width={z.w} height={z.h} fill="rgba(212,82,26,0.04)" stroke="rgba(212,82,26,0.3)" strokeWidth="1" strokeDasharray="5,3" rx="2"/>
          <text x={z.x+z.w/2} y={z.y-3} textAnchor="middle" fontSize="7" fill="rgba(212,82,26,0.6)" fontFamily="Segoe UI,sans-serif">DTF PRINT ZONE</text>
          {logo?(
            <>
              <image href={logo.url} x={pl.x} y={pl.y} width={pl.w} height={pl.h} preserveAspectRatio="xMidYMid meet" style={{cursor:"move"}} onMouseDown={e=>startDrag(e,side)} onTouchStart={e=>startDrag(e,side)}/>
              <rect x={pl.x} y={pl.y} width={pl.w} height={pl.h} fill="none" stroke={T.acc} strokeWidth="1.5" strokeDasharray="4,2" rx="2" style={{pointerEvents:"none"}}/>
              <circle cx={pl.x+5} cy={pl.y+5} r="5" fill={T.acc} style={{pointerEvents:"none"}}/>
              <text x={pl.x+5} y={pl.y+9} textAnchor="middle" fontSize="6" fill="white" style={{pointerEvents:"none"}}>✥</text>
              <rect x={pl.x+pl.w-9} y={pl.y+pl.h-9} width="11" height="11" fill={T.acc} rx="2" style={{cursor:"se-resize"}} onMouseDown={e=>startResize(e,side)} onTouchStart={e=>startResize(e,side)}/>
              <text x={pl.x+pl.w-3} y={pl.y+pl.h-1} fontSize="8" fill="white" style={{pointerEvents:"none"}}>↔</text>
            </>
          ):(
            <text x={z.x+z.w/2} y={z.y+z.h/2+4} textAnchor="middle" fontSize="9" fill="rgba(212,82,26,0.4)" fontFamily="Segoe UI,sans-serif" fontWeight="600">Click to upload logo</text>
          )}
        </svg>
        {logo?(
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6,padding:"4px 8px",background:T.grnbg,borderRadius:6}}>
            <p style={{color:T.grn,fontSize:10,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{logo.name}</p>
            <button onClick={()=>upd({[side+"Logo"]:null,[side+"Pl"]:null})} style={{background:"none",border:"none",color:T.mut,cursor:"pointer",fontSize:14,marginLeft:4}}>✕</button>
          </div>
        ):(
          <button onClick={()=>side==="front"?frontRef.current?.click():backRef.current?.click()}
            style={{width:"100%",marginTop:6,padding:"6px",background:T.acbg,border:`1px dashed ${T.acc}`,borderRadius:6,color:T.acc,fontSize:11,fontWeight:600,cursor:"pointer"}}>
            + Upload {side} logo
          </button>
        )}
        {side==="front"&&<input ref={frontRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleLogo(e.target.files[0],"front")}/>}
        {side==="back"&&<input ref={backRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleLogo(e.target.files[0],"back")}/>}
      </div>
    );
  };

  return(
    <div style={{background:T.sur,border:`1.5px solid ${T.bdr}`,borderRadius:16,padding:20,marginBottom:16,animation:"fadein 0.3s ease"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <p style={{fontFamily:"Georgia,serif",fontSize:16,fontWeight:700,color:T.ink}}>Product {num}{planMax!==999?` of ${planMax}`:""}</p>
          <p style={{color:T.mut,fontSize:11,marginTop:2}}>Select a product and customise your design</p>
        </div>
        <div style={{display:"flex",gap:5}}>
          {Array.from({length:Math.min(total,planMax===999?total:planMax)}).map((_,i)=>(
            <div key={i} style={{width:8,height:8,borderRadius:"50%",background:i<num?T.acc:i===num-1?T.ink:T.bdr}}/>
          ))}
        </div>
      </div>

      {/* Product selection grid */}
      {(showGrid||!d.productId)?(
        <div>
          <Label c="Choose a product"/>
          {loadingProducts?(
            <div style={{textAlign:"center",padding:"30px 0"}}><Spin/><p style={{color:T.mut,fontSize:13,marginTop:8}}>Loading products from your store…</p></div>
          ):products.length===0?(
            <p style={{color:T.mut,fontSize:13,textAlign:"center",padding:"20px 0"}}>No products found in your store.</p>
          ):(
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
              {products.map(p=>(
                <div key={p.id} onClick={()=>{upd({productId:p.id,colours:[],sizes:[]});setShowGrid(false);}}
                  style={{border:`2px solid ${d.productId===p.id?T.acc:T.bdr}`,borderRadius:12,overflow:"hidden",cursor:"pointer",transition:"all 0.15s",background:d.productId===p.id?T.acbg:T.sur}}>
                  {p.image?(
                    <img src={p.image} alt={p.name} style={{width:"100%",aspectRatio:"1",objectFit:"cover",display:"block"}}/>
                  ):(
                    <div style={{width:"100%",aspectRatio:"1",background:T.fnt,display:"flex",alignItems:"center",justifyContent:"center",fontSize:32}}>👕</div>
                  )}
                  <div style={{padding:"8px 10px"}}>
                    <p style={{color:T.ink,fontWeight:600,fontSize:12,lineHeight:1.3}}>{p.name}</p>
                    <p style={{color:T.mut,fontSize:10,marginTop:2}}>{p.colours.length} colours · {p.sizes.length} sizes</p>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      ):(
        <>
          {/* Selected product header */}
          <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 14px",background:T.grnbg,border:`1px solid ${T.grn}`,borderRadius:10,marginBottom:16}}>
            {prod?.image&&<img src={prod.image} alt="" style={{width:40,height:40,borderRadius:6,objectFit:"cover"}}/>}
            <div style={{flex:1}}>
              <p style={{color:T.grn,fontWeight:700,fontSize:13}}>{prod?.name||"Product"}</p>
              <p style={{color:T.mut,fontSize:11}}>Shopify · DTF print · 36×42cm</p>
            </div>
            <button onClick={()=>setShowGrid(true)} style={{background:"none",border:`1px solid ${T.bdr}`,borderRadius:8,padding:"5px 10px",fontSize:11,color:T.mut,cursor:"pointer"}}>Change</button>
          </div>

          {/* Design canvases */}
          <div style={{display:"flex",gap:12,marginBottom:12}}>
            {canvas("front")}
            {!prod?.category?.toLowerCase().includes("cap")&&!prod?.name?.toLowerCase().includes("cap")&&canvas("back")}
          </div>
          <p style={{color:T.mut,fontSize:11,textAlign:"center",marginBottom:16}}>💡 Click garment to upload logo · Drag to reposition · Drag ↔ to resize</p>

          {/* Colour selector — multiple */}
          {prod?.colours?.length>0&&(
            <div style={{marginBottom:16}}>
              <Label c={`Colours to offer${d.colours?.length>0?` (${d.colours.length} selected)`:""}`}/>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {prod.colours.map(col=>{
                  const sel=(d.colours||[]).includes(col);
                  // Try to map colour name to approximate hex
                  const hexMap={"White":"#FFFFFF","Black":"#1A1714","Navy":"#1B2A4A","Forest":"#2D4A35","Slate":"#6B7A8D","Bone":"#E8DFD0","Ash":"#C8C4BC","Clay":"#B5734A","Dusty Blue":"#7EA3B8","Washed Black":"#3A3735","Mauve":"#B8849A","Military Green":"#5C6B4A","Maroon":"#6B2035","Red":"#C0392B","Royal":"#2A5FA5","Khaki":"#8B7355","Stone":"#C0B89A","Faded Black":"#3D3535","Natural":"#E8D8C0","Lilac":"#C8A8C8","Sage":"#8B9E7E"};
                  const hex=hexMap[col]||"#888888";
                  const isLight=["#FFFFFF","#E8DFD0","#C8C4BC","#E8D8C0","#E8E4DC"].includes(hex);
                  return(
                    <button key={col} onClick={()=>upd({colours:sel?(d.colours||[]).filter(c=>c!==col):[...(d.colours||[]),col]})}

                      style={{display:"flex",alignItems:"center",gap:6,padding:"5px 10px",background:sel?T.ink:T.fnt,border:`1.5px solid ${sel?T.ink:T.bdr}`,borderRadius:99,cursor:"pointer",transition:"all 0.15s"}}>
                      <div style={{width:14,height:14,borderRadius:"50%",background:hex,border:isLight?"1px solid #ccc":"none",flexShrink:0}}/>
                      <span style={{fontSize:11,fontWeight:sel?700:500,color:sel?"white":T.mut}}>{col}</span>
                    </button>
                  );
                })}
              </div>
              <p style={{color:T.mut,fontSize:11,marginTop:6}}>Select all colours you want to offer. One design applies to all colours.</p>
            </div>
          )}

          {/* Size selector */}
          {prod?.sizes?.length>0&&(
            <div style={{marginBottom:16}}>
              <Label c="Sizes to offer"/>
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>

// ── ROOT ──────────────────────────────────────────────────────────────────────
function App(){
  const[step,setStep]=useState("brand");
  const[done,setDone]=useState(false);
  const[busy,setBusy]=useState(false);
  const[err,setErr]=useState("");
  const[checkoutLoading,setCheckoutLoading]=useState(false);
  const[checkoutErr,setCheckoutErr]=useState("");
  const[products,setProducts]=useState([]);
  const[loadingProducts,setLoadingProducts]=useState(true);

  const[brand,setBrand]=useState({brandName:"",tagline:"",category:""});
  const[contact,setContact]=useState({firstName:"",lastName:"",email:"",phone:"",street:"",suburb:"",state:"",postcode:"",country:"Australia"});
  const[bank,setBank]=useState({bank:"",accountName:"",bsb:"",accountNumber:""});
  const[planId,setPlanId]=useState("starter");
  const[slots,setSlots]=useState([null]);

  // Handle Stripe Checkout return
  useEffect(()=>{
    const params=new URLSearchParams(window.location.search);
    if(params.get("checkout")==="success"){
      const saved=localStorage.getItem("mod_vendor");
      if(saved){
        const v=JSON.parse(saved);
        const plan=planOf(v.planId);
        sb.from("vendors").insert({
          name:v.contact.firstName+" "+v.contact.lastName,
          email:v.contact.email.toLowerCase().trim(),
          phone:v.contact.phone,brand_name:v.brand.brandName,store_name:v.brand.brandName,
          address:[v.contact.street,v.contact.suburb,v.contact.state,v.contact.postcode,v.contact.country].filter(Boolean).join(", "),
          bank:v.bank.bank,bsb:v.bank.bsb,account_number:v.bank.accountNumber,account_name:v.bank.accountName,
          plan:v.planId,payout_rate:plan.payout,status:"pending",
          notes:JSON.stringify({tagline:v.brand.tagline,category:v.brand.category,productSlots:v.slots}),
        }).select().single().then(function(result){
          if(!result.error&&result.data){
            sb.from("subscriptions").insert({vendor_id:result.data.id,plan:v.planId,price:plan.price,payout_rate:plan.payout,status:"active",stripe_subscription_id:params.get("session_id")});
          }
        });
        localStorage.removeItem("mod_vendor");
        setBrand(v.brand);setPlanId(v.planId);
      }
      setDone(true);
      window.history.replaceState({},"",window.location.pathname);
    }
  },[]);

  // Load Shopify products on mount
  useEffect(()=>{
    fetchShopifyProducts()
      .then(p=>{setProducts(p);setLoadingProducts(false);})
      .catch(e=>{console.warn("Storefront API:",e);setLoadingProducts(false);});
  },[]);



  const idx=STEPS.findIndex(s=>s.id===step);
  const next=()=>{if(idx<STEPS.length-1)setStep(STEPS[idx+1].id);};
  const back=()=>{if(idx>0)setStep(STEPS[idx-1].id);};

  const ok=()=>{
    if(step==="brand")   return !!brand.brandName;
    if(step==="contact") return !!(contact.firstName&&contact.lastName&&contact.email&&contact.phone&&contact.street&&contact.suburb&&contact.state&&contact.postcode);
    if(step==="bank")    return !!(bank.bank&&bank.accountName&&bank.bsb&&bank.accountNumber);
    if(step==="plan")    return !!planId;
    if(step==="payment") return true;
    return true;
  };

  const handleCheckout=async()=>{
    setCheckoutLoading(true);setCheckoutErr("");
    try{
      const vendorData={brand,contact,bank,planId,slots};
      localStorage.setItem("mod_vendor",JSON.stringify(vendorData));
      const baseUrl=window.location.origin+window.location.pathname;
      const res=await fetch(PROXY+"/stripe/checkout",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          priceId:PRICE_IDS[planId],
          successUrl:baseUrl+"?checkout=success&session_id={CHECKOUT_SESSION_ID}",
          cancelUrl:baseUrl+"?checkout=cancel",
          email:contact.email,
          name:contact.firstName+" "+contact.lastName,
          metadata:{planId:planId,vendorName:brand.brandName},
        }),
      });
      const data=await res.json();
      if(!res.ok)throw new Error(data.error||"Could not create checkout");
      window.location.href=data.url;
    }catch(e){
      setCheckoutErr(e.message);
      setCheckoutLoading(false);
    }
  };


  if(done)return <Success brandName={brand.brandName} planId={planId}/>;

  return(<div style={{background:T.bg,minHeight:"100vh"}}>
    <div style={{background:T.sur,borderBottom:`1.5px solid ${T.bdr}`,padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
      <div>
        <p style={{fontFamily:"Georgia,serif",fontWeight:900,fontSize:17,color:T.ink}}>Merch on Demand</p>
        <p style={{color:T.mut,fontSize:10,fontWeight:500}}>Vendor Application</p>
      </div>
      <div style={{background:T.acbg,border:`1.5px solid ${T.acbdr}`,borderRadius:99,padding:"4px 14px"}}>
        <span style={{color:T.acc,fontSize:11,fontWeight:700}}>Step {idx+1} of {STEPS.length}</span>
      </div>
    </div>
    <div style={{background:T.sur,borderBottom:`1.5px solid ${T.bdr}`,padding:"14px 24px 12px"}}><PBar step={step}/></div>
    <div style={{maxWidth:640,margin:"0 auto",padding:"28px 24px 80px"}}>
      {step==="brand"  &&<StepBrand   d={brand}   set={setBrand}/>}
      {step==="contact"&&<StepContact d={contact} set={setContact}/>}
      {step==="bank"   &&<StepBank    d={bank}    set={setBank}/>}
      {step==="plan"   &&<StepPlan    sel={planId} onSel={setPlanId}/>}
      {step==="payment"&&React.createElement(StepPayment,{planId:planId,onCheckout:handleCheckout,checkoutLoading:checkoutLoading,checkoutErr:checkoutErr})}
      {step==="design" &&<StepDesign  planId={planId} slots={slots} setSlots={setSlots} products={products} loadingProducts={loadingProducts}/>}

      {err&&<div style={{background:"#FEE2E2",border:"1px solid #FCA5A5",borderRadius:10,padding:12,marginTop:16}}><p style={{color:"#991B1B",fontSize:13}}>⚠ {err}</p></div>}
      <div style={{display:"flex",gap:12,marginTop:30}}>
        {idx>0&&<button onClick={back} style={{flex:1,padding:"13px",background:T.fnt,border:`1.5px solid ${T.bdr}`,borderRadius:12,fontSize:14,fontWeight:700,color:T.mut,cursor:"pointer"}}>← Back</button>}
        {step!=="payment"&&React.createElement('button',{onClick:next,disabled:!ok(),style:{flex:2,padding:"13px",background:!ok()?T.fnt:T.ink,border:"none",borderRadius:12,fontSize:14,fontWeight:700,color:!ok()?T.mut:"white",cursor:!ok()?"default":"pointer",fontFamily:"inherit"}},"Continue →")}
      </div>
    </div>
  </div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
