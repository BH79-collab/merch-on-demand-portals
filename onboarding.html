function ProductSlot({slotNum,totalSlots,planMax,productDesign,onChange,shopifyProducts}){
  const catalogue = shopifyProducts.length > 0 ? shopifyProducts : AS_CATALOGUE;
  const[syncing,setSyncing]=useState(false);
  const frontInputRef=useRef();
  const backInputRef=useRef();

  const d = productDesign || {productId:"",colour:"#FFFFFF",sizes:[],frontLogo:null,backLogo:null,frontPlacement:null,backPlacement:null,notes:""};
  const selectedProduct = catalogue.find(p=>p.id===d.productId);

  const update=patch=>onChange({...d,...patch});

  const handleLogoUpload=async(file,side)=>{
    if(!file||!file.type.startsWith("image/"))return;
    const url=await readFileAsDataURL(file);
    update({[side+"Logo"]:{name:file.name,url},[side+"Placement"]:null});
  };

  // Draggable logo state
  const isDragging=useRef(false);
  const isResizing=useRef(false);
  const dragStart=useRef({});
  const containerRef=useRef();

  const getScale=()=>{
    if(!containerRef.current)return{sx:1,sy:1};
    const{width,height}=containerRef.current.getBoundingClientRect();
    return{sx:width/200,sy:height/220};
  };

  const startDrag=(e,side)=>{
    e.preventDefault();e.stopPropagation();
    const pl=d[side+"Placement"]||{x:68,y:60,w:64,h:64};
    const{sx,sy}=getScale();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    const clientY=e.touches?e.touches[0].clientY:e.clientY;
    isDragging.current={side,pl};
    dragStart.current={mx:clientX,my:clientY,lx:pl.x*sx,ly:pl.y*sy};
    const pz={x:62,y:55,w:76,h:90};
    const move=ev=>{
      if(!isDragging.current)return;
      const cx=ev.touches?ev.touches[0].clientX:ev.clientX;
      const cy=ev.touches?ev.touches[0].clientY:ev.clientY;
      const{sx:sx2,sy:sy2}=getScale();
      let nx=(dragStart.current.lx+(cx-dragStart.current.mx))/sx2;
      let ny=(dragStart.current.ly+(cy-dragStart.current.my))/sy2;
      nx=Math.max(pz.x,Math.min(pz.x+pz.w-pl.w,nx));
      ny=Math.max(pz.y,Math.min(pz.y+pz.h-pl.h,ny));
      update({[side+"Placement"]:{...pl,x:nx,y:ny}});
    };
    const up=()=>{isDragging.current=false;window.removeEventListener("mousemove",move);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",move);window.removeEventListener("touchend",up);};
    window.addEventListener("mousemove",move);window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",move,{passive:false});window.addEventListener("touchend",up);
  };

  const startResize=(e,side)=>{
    e.preventDefault();e.stopPropagation();
    const pl=d[side+"Placement"]||{x:68,y:60,w:64,h:64};
    const{sx}=getScale();
    const clientX=e.touches?e.touches[0].clientX:e.clientX;
    isResizing.current={side,pl};
    dragStart.current={mx:clientX,lw:pl.w*sx};
    const pz={x:62,y:55,w:76,h:90};
    const move=ev=>{
      if(!isResizing.current)return;
      const cx=ev.touches?ev.touches[0].clientX:ev.clientX;
      const{sx:sx2}=getScale();
      let nw=(dragStart.current.lw+(cx-dragStart.current.mx))/sx2;
      nw=Math.max(10,Math.min(pz.x+pz.w-pl.x,nw));
      const nh=nw*(pl.h/pl.w);
      update({[side+"Placement"]:{...pl,w:nw,h:Math.min(nh,pz.y+pz.h-pl.y)}});
    };
    const up=()=>{isResizing.current=false;window.removeEventListener("mousemove",move);window.removeEventListener("mouseup",up);window.removeEventListener("touchmove",move);window.removeEventListener("touchend",up);};
    window.addEventListener("mousemove",move);window.addEventListener("mouseup",up);
    window.addEventListener("touchmove",move,{passive:false});window.addEventListener("touchend",up);
  };

  const renderCanvas=(side)=>{
    const logo=d[side+"Logo"];
    const pz={x:62,y:side==="front"?55:50,w:76,h:90};
    const pl=d[side+"Placement"]||{x:pz.x+pz.w*0.15,y:pz.y+pz.h*0.15,w:pz.w*0.7,h:pz.h*0.7};
    const colour=d.colour||"#FFFFFF";
    const isLight=["#FFFFFF","#E8DFD0","#C8C4BC","#E8E4DC"].includes(colour);
    const stroke=isLight?"#CCCCCC":"transparent";
    const bodyPath="M55,20 L30,45 L5,38 L18,80 L40,75 L40,205 L160,205 L160,75 L182,80 L195,38 L170,45 L145,20 C140,28 130,35 100,35 C70,35 60,28 55,20 Z";
    const isHoodie=selectedProduct?.category?.includes("Hoodie");
    const isCap=selectedProduct?.category?.includes("Cap");

    if(isCap&&side==="back")return null;

    return(
      <div style={{position:"relative",background:T.surface,border:`1.5px solid ${T.border}`,borderRadius:12,padding:10,flex:1}} ref={side==="front"?containerRef:null}>
        <p style={{textAlign:"center",fontSize:9,fontWeight:700,color:T.muted,textTransform:"uppercase",letterSpacing:"0.08em",marginBottom:6}}>{side==="front"?"FRONT":"BACK"}</p>

        {/* Click to upload hint */}
        {!logo&&<p style={{textAlign:"center",fontSize:10,color:T.accent,marginBottom:4}}>👆 Click garment to upload logo</p>}

        <svg viewBox="0 0 200 220" style={{width:"100%",display:"block",cursor:"pointer"}}
          onClick={()=>{if(!logo){side==="front"?frontInputRef.current?.click():backInputRef.current?.click();}}}
        >
          <ellipse cx="100" cy="215" rx="70" ry="6" fill="rgba(0,0,0,0.06)"/>

          {isCap?(
            <>
              <path d="M20,115 Q60,140 140,115 Q170,130 180,125 Q160,145 20,130 Z" fill={colour} stroke={stroke} strokeWidth="1"/>
              <path d="M30,110 Q50,45 100,40 Q150,45 170,110 Q130,125 70,125 Z" fill={colour} stroke={stroke} strokeWidth="1.5"/>
              <line x1="100" y1="40" x2="100" y2="115" stroke="rgba(0,0,0,0.07)" strokeWidth="1"/>
              <circle cx="100" cy="42" r="4" fill="rgba(0,0,0,0.12)"/>
            </>
          ):(
            <>
              <path d={bodyPath} fill={colour} stroke={stroke} strokeWidth="1.5"/>
              <path d="M55,20 C60,28 70,35 100,35 C130,35 140,28 145,20" fill="none" stroke={stroke||"rgba(0,0,0,0.1)"} strokeWidth="2"/>
              {isHoodie&&<path d="M50,22 C45,10 65,2 100,2 C135,2 155,10 150,22 C145,15 130,8 100,8 C70,8 55,15 50,22 Z" fill={colour} stroke={stroke||"rgba(0,0,0,0.08)"} strokeWidth="1"/>}
              {isHoodie&&side==="front"&&<rect x="65" y="155" width="70" height="40" rx="4" fill="rgba(0,0,0,0.06)" stroke="rgba(0,0,0,0.08)" strokeWidth="1"/>}
              <line x1="40" y1="75" x2="40" y2="205" stroke="rgba(0,0,0,0.06)" strokeWidth="1"/>
              <line x1="160" y1="75" x2="160" y2="205" stroke="rgba(0,0,0,0.06)" strokeWidth="1"/>
            </>
          )}

          {/* Print zone */}
          <rect x={pz.x} y={pz.y} width={pz.w} height={pz.h} fill="rgba(212,82,26,0.04)" stroke="rgba(212,82,26,0.3)" strokeWidth="1" strokeDasharray="5,3" rx="2"/>
          <text x={pz.x+pz.w/2} y={pz.y-3} textAnchor="middle" fontSize="7" fill="rgba(212,82,26,0.6)" fontFamily="Segoe UI,sans-serif">DTF PRINT ZONE</text>

          {logo?(
            <>
              <image href={logo.url} x={pl.x} y={pl.y} width={pl.w} height={pl.h}
                preserveAspectRatio="xMidYMid meet"
                style={{cursor:"move"}}
                onMouseDown={e=>startDrag(e,side)}
                onTouchStart={e=>startDrag(e,side)}/>
              <rect x={pl.x} y={pl.y} width={pl.w} height={pl.h} fill="none" stroke={T.accent} strokeWidth="1.5" strokeDasharray="4,2" rx="2" style={{pointerEvents:"none"}}/>
              <circle cx={pl.x+5} cy={pl.y+5} r="5" fill={T.accent} style={{pointerEvents:"none"}}/>
              <text x={pl.x+5} y={pl.y+9} textAnchor="middle" fontSize="6" fill="white" style={{pointerEvents:"none"}}>✥</text>
              <rect x={pl.x+pl.w-9} y={pl.y+pl.h-9} width="11" height="11" fill={T.accent} rx="2"
                style={{cursor:"se-resize"}} onMouseDown={e=>startResize(e,side)} onTouchStart={e=>startResize(e,side)}/>
              <text x={pl.x+pl.w-3} y={pl.y+pl.h-1} fontSize="8" fill="white" style={{pointerEvents:"none"}}>↔</text>
            </>
          ):(
            <text x={pz.x+pz.w/2} y={pz.y+pz.h/2+4} textAnchor="middle" fontSize="9" fill="rgba(212,82,26,0.4)" fontFamily="Segoe UI,sans-serif" fontWeight="600">Click to upload logo</text>
          )}
        </svg>

        {/* Hidden file inputs */}
        {side==="front"&&<input ref={frontInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleLogoUpload(e.target.files[0],"front")}/>}
        {side==="back"&&<input ref={backInputRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handleLogoUpload(e.target.files[0],"back")}/>}

        {/* Logo label + remove */}
        {logo&&(
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6,padding:"4px 6px",background:T.greenBg,borderRadius:6}}>
            <p style={{color:T.green,fontSize:10,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",flex:1}}>{logo.name}</p>
            <button onClick={()=>{update({[side+"Logo"]:null,[side+"Placement"]:null});}} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:14,marginLeft:6,flexShrink:0}}>✕</button>
          </div>
        )}
        {!logo&&(
          <button onClick={()=>side==="front"?frontInputRef.current?.click():backInputRef.current?.click()}
            style={{width:"100%",marginTop:6,padding:"6px",background:T.accentBg,border:`1px dashed ${T.accent}`,borderRadius:6,color:T.accent,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>
            + Upload {side} logo
          </button>
        )}
      </div>
    );
  };

  return(
    <div style={{background:T.surface,border:`1.5px solid ${T.border}`,borderRadius:16,padding:20,marginBottom:16}}>
      {/* Slot header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
        <div>
          <p style={{fontFamily:"Georgia,serif",fontSize:16,fontWeight:700,color:T.ink}}>Product {slotNum} of {planMax===999?"∞":planMax}</p>
          <p style={{color:T.muted,fontSize:11,marginTop:2}}>Select a product and customise your design</p>
        </div>
        {/* Slot progress dots */}

// ── STEP: DESIGN ──────────────────────────────────────────────────────────────
function StepDesign({planId,productSlots,onChange,shopifyProducts,shopifyToken,shopifyStore}){
  const plan=planOf(planId);
  const maxSlots=plan.maxProducts===999?10:plan.maxProducts;
  const[numSlots,setNumSlots]=useState(Math.max(1,productSlots.filter(Boolean).length)||1);
  const[syncing,setSyncing]=useState(false);
  const[syncMsg,setSyncMsg]=useState("");
  const[liveProducts,setLiveProducts]=useState(shopifyProducts||[]);

  // Sync from Shopify if token available
  const syncProducts=useCallback(async()=>{
    if(!shopifyToken||!shopifyStore)return;
    setSyncing(true);setSyncMsg("Fetching products from Shopify…");
    try{
      const r=await fetch(`${PROXY}/shopify?store=${encodeURIComponent(shopifyStore)}&path=products.json?limit=250`,{headers:{"x-shopify-token":shopifyToken}});
      if(!r.ok)throw new Error("HTTP "+r.status);
      const{products}=await r.json();
      const mapped=products.map(p=>({
        id:p.id.toString(),shopifyId:p.id.toString(),name:p.title,
        category:p.product_type||p.title,
        colours:[...new Map(p.variants.filter(v=>v.option1).map(v=>[v.option1,{n:v.option1,h:"#888888"}])).values()],
        sizes:[...new Set(p.variants.filter(v=>v.option2).map(v=>v.option2))],
      }));
      setLiveProducts(mapped);
      setSyncMsg(`✓ ${mapped.length} products loaded from Shopify`);
    }catch(e){setSyncMsg("Could not load from Shopify — using catalogue");}
    finally{setSyncing(false);setTimeout(()=>setSyncMsg(""),4000);}
  },[shopifyToken,shopifyStore]);

  const catalogue=liveProducts.length>0?liveProducts:AS_CATALOGUE;

  return(
    <div>
      <StepHeader title="Product Design" subtitle={`Design up to ${maxSlots===999?"unlimited":maxSlots} products on your ${plan.name} plan. Click the garment to upload your logo.`}/>

      {(shopifyToken&&shopifyStore)&&(
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 14px",background:T.greenBg,border:`1.5px solid ${T.green}`,borderRadius:12,marginBottom:16}}>
          <p style={{color:T.green,fontSize:12,fontWeight:600}}>{syncMsg||"Connected to your Shopify store"}</p>
          <button onClick={syncProducts} disabled={syncing} style={{padding:"6px 12px",background:T.green,border:"none",borderRadius:8,color:"white",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{syncing?"…":"↻ Sync Products"}</button>
        </div>
      )}

      {/* Product slots */}
      {Array.from({length:numSlots}).map((_,i)=>(
        <ProductSlot key={i} slotNum={i+1} totalSlots={numSlots} planMax={maxSlots}
          productDesign={productSlots[i]}
          onChange={d=>{const slots=[...productSlots];slots[i]=d;onChange(slots);}}
          shopifyProducts={catalogue}/>
      ))}

      {/* Add product button */}
      {numSlots<maxSlots&&(
        <button onClick={()=>setNumSlots(n=>n+1)}
          style={{width:"100%",padding:"12px",background:T.faint,border:`2px dashed ${T.border}`,borderRadius:14,color:T.muted,fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit",marginBottom:8}}>
          + Add Another Product ({numSlots}/{maxSlots==="999"?"∞":maxSlots})
        </button>
      )}
      {numSlots>=maxSlots&&maxSlots!==999&&(
        <div style={{textAlign:"center",padding:"10px",background:T.accentBg,border:`1px solid ${T.accentBorder}`,borderRadius:10,marginBottom:8}}>
          <p style={{color:T.accent,fontSize:12,fontWeight:600}}>You've reached your {plan.name} plan limit of {maxSlots} products. <a href="#" style={{color:T.accent}}>Upgrade to add more.</a></p>
        </div>
      )}
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App(){
  const[step,setStep]=useState("brand");
  const[submitted,setSubmitted]=useState(false);
  const[submitting,setSubmitting]=useState(false);
  const[submitErr,setSubmitErr]=useState("");
  const[cardReady,setCardReady]=useState(false);

  const[brand,setBrand]=useState({brandName:"",tagline:"",category:""});
  const[contact,setContact]=useState({firstName:"",lastName:"",email:"",phone:"",street:"",suburb:"",state:"",postcode:"",country:"Australia"});
  const[bank,setBank]=useState({bank:"",accountName:"",bsb:"",accountNumber:""});
  const[planId,setPlanId]=useState("starter");
  const[productSlots,setProductSlots]=useState([null]);

  // Listen for Stripe card ready events
  useEffect(()=>{
    const handler=e=>setCardReady(e.detail);
    window.addEventListener("stripeready",handler);
    return()=>window.removeEventListener("stripeready",handler);
  },[]);

  const stepIdx=STEPS.findIndex(s=>s.id===step);
  const goNext=()=>{if(stepIdx<STEPS.length-1)setStep(STEPS[stepIdx+1].id);};
  const goBack=()=>{if(stepIdx>0)setStep(STEPS[stepIdx-1].id);};

  const canContinue=()=>{
    if(step==="brand")   return !!brand.brandName;
    if(step==="contact") return !!(contact.firstName&&contact.lastName&&contact.email&&contact.phone&&contact.street&&contact.suburb&&contact.state&&contact.postcode);
    if(step==="bank")    return !!(bank.bank&&bank.accountName&&bank.bsb&&bank.accountNumber);
    if(step==="plan")    return !!planId;
    if(step==="payment") return cardReady;
    return true;
  };

  const handleSubmit=async()=>{
    setSubmitting(true);setSubmitErr("");
    try{
      const plan=PLANS.find(p=>p.id===planId);
      const stripe=window.getStripe();
      const card=window.getCard();
      if(!stripe||!card)throw new Error("Payment not ready. Please go back to the payment step and re-enter your card.");

      // Create payment method
      const{paymentMethod,error}=await stripe.createPaymentMethod({type:"card",card,billing_details:{email:contact.email,name:`${contact.firstName} ${contact.lastName}`}});
      if(error)throw new Error(error.message);

      // Create subscription via proxy
      const res=await fetch(PROXY+"/stripe/subscribe",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email:contact.email,name:`${contact.firstName} ${contact.lastName}`,priceId:PRICE_IDS[planId],paymentMethodId:paymentMethod.id})});
      const subData=await res.json();
      if(!res.ok)throw new Error(subData.error||"Payment failed");
      if(subData.clientSecret){const{error:ce}=await stripe.confirmCardPayment(subData.clientSecret);if(ce)throw new Error(ce.message);}

      // Save to Supabase
      const{data:vendor,error:ve}=await sb.from("vendors").insert({
        name:`${contact.firstName} ${contact.lastName}`,email:contact.email.toLowerCase().trim(),phone:contact.phone,
        brand_name:brand.brandName,store_name:brand.brandName,
        address:[contact.street,contact.suburb,contact.state,contact.postcode,contact.country].filter(Boolean).join(", "),
        bank:bank.bank,bsb:bank.bsb,account_number:bank.accountNumber,account_name:bank.accountName,
        plan:planId,payout_rate:plan.payout,status:"pending",
        notes:JSON.stringify({tagline:brand.tagline,category:brand.category,productSlots,stripeCustomerId:subData.customerId}),
      }).select().single();
      if(ve)throw new Error(ve.message);

      await sb.from("subscriptions").insert({vendor_id:vendor.id,plan:planId,price:plan.price,payout_rate:plan.payout,status:"active",stripe_subscription_id:subData.subscriptionId});
      setSubmitted(true);
    }catch(e){setSubmitErr(e.message);}
    finally{setSubmitting(false);}
  };

  if(submitted)return <Success brandName={brand.brandName} planId={planId}/>;

  return(
    <div style={{background:T.bg,minHeight:"100vh"}}>
      <div style={{background:T.surface,borderBottom:`1.5px solid ${T.border}`,padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
        <div><p style={{fontFamily:"Georgia,serif",fontWeight:900,fontSize:17,color:T.ink}}>Merch on Demand</p><p style={{color:T.muted,fontSize:10,fontWeight:500}}>Vendor Application</p></div>
        <div style={{background:T.accentBg,border:`1.5px solid ${T.accentBorder}`,borderRadius:99,padding:"4px 14px"}}><span style={{color:T.accent,fontSize:11,fontWeight:700}}>Step {stepIdx+1} of {STEPS.length}</span></div>
      </div>
      <div style={{background:T.surface,borderBottom:`1.5px solid ${T.border}`,padding:"14px 24px 12px"}}><ProgressBar step={step}/></div>
      <div style={{maxWidth:640,margin:"0 auto",padding:"28px 24px 80px"}}>
        {step==="brand"  &&<StepBrand   data={brand}   setData={setBrand}/>}
        {step==="contact"&&<StepContact data={contact} setData={setContact}/>}
        {step==="bank"   &&<StepBank    data={bank}    setData={setBank}/>}
        {step==="plan"   &&<StepPlan    selectedPlan={planId} onSelect={setPlanId}/>}
        {step==="payment"&&<StepPayment plan={planId}/>}
        {step==="design" &&<StepDesign  planId={planId} productSlots={productSlots} onChange={setProductSlots} shopifyProducts={[]} shopifyToken="" shopifyStore=""/>}
        {step==="review" &&<StepReview  brand={brand} contact={contact} bank={bank} planId={planId} productSlots={productSlots}/>}
        {submitErr&&<div style={{background:"#FEE2E2",border:"1px solid #FCA5A5",borderRadius:10,padding:12,marginTop:16}}><p style={{color:"#991B1B",fontSize:13}}>⚠ {submitErr}</p></div>}
        <div style={{display:"flex",gap:12,marginTop:30}}>
          {stepIdx>0&&<button onClick={goBack} style={{flex:1,padding:"13px",background:T.faint,border:`1.5px solid ${T.border}`,borderRadius:12,fontSize:14,fontWeight:700,color:T.muted,cursor:"pointer",fontFamily:"inherit"}}>← Back</button>}
          {step==="review"
            ?<button onClick={handleSubmit} disabled={submitting} style={{flex:2,padding:"13px",background:submitting?T.faint:T.green,border:"none",borderRadius:12,fontSize:14,fontWeight:700,color:submitting?T.muted:"white",cursor:submitting?"default":"pointer",fontFamily:"inherit"}}>{submitting?<Spin/>:"✓ Submit & Pay"}</button>
            :<button onClick={goNext} disabled={!canContinue()} style={{flex:2,padding:"13px",background:!canContinue()?T.faint:T.ink,border:"none",borderRadius:12,fontSize:14,fontWeight:700,color:!canContinue()?T.muted:"white",cursor:!canContinue()?"default":"pointer",fontFamily:"inherit"}}>Continue →</button>
          }
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
