// ── LOGO UPLOAD SLOT ──────────────────────────────────────────────────────────
function LogoSlot({label,logo,onSet,onClear,hint}){
  const ref=useRef();
  const[drag,setDrag]=useState(false);
  const handle=async(file)=>{
    if(!file?.type.startsWith("image/"))return;
    const r=new FileReader();
    r.onload=e=>onSet({name:file.name,url:e.target.result});
    r.readAsDataURL(file);
  };
  return(
    <div style={{flex:1}}>
      <Label>{label}</Label>
      {hint&&<p style={{color:T.muted,fontSize:10,marginBottom:8}}>{hint}</p>}
      {logo?(
        <div style={{position:"relative",border:`1.5px solid ${T.border}`,borderRadius:12,background:"#F9F9F9",aspectRatio:"1",overflow:"hidden"}}>
          <img src={logo.url} alt="" style={{width:"100%",height:"100%",objectFit:"contain",padding:10}}/>
          <button onClick={onClear} style={{position:"absolute",top:6,right:6,width:24,height:24,borderRadius:"50%",background:T.ink,border:"none",color:"white",fontSize:12,cursor:"pointer"}}>✕</button>
          <div style={{position:"absolute",bottom:0,left:0,right:0,background:"rgba(0,0,0,0.5)",padding:"3px 8px"}}>
            <p style={{color:"white",fontSize:9,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{logo.name}</p>
          </div>
        </div>
      ):(
        <div onClick={()=>ref.current?.click()}
          onDragOver={e=>{e.preventDefault();setDrag(true);}}
          onDragLeave={()=>setDrag(false)}
          onDrop={e=>{e.preventDefault();setDrag(false);handle(e.dataTransfer.files[0]);}}
          style={{border:`2px dashed ${drag?T.accent:T.border}`,borderRadius:12,aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,cursor:"pointer",background:drag?T.accentBg:T.faint}}>
          <span style={{fontSize:28}}>📁</span>
          <p style={{color:T.muted,fontSize:11,fontWeight:600,textAlign:"center",padding:"0 10px"}}>Drop or tap</p>
          <p style={{color:T.muted,fontSize:9}}>PNG · SVG · JPG</p>
          <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={e=>handle(e.target.files[0])}/>
        </div>
      )}
    </div>
  );
}

// ── GARMENT CANVAS ────────────────────────────────────────────────────────────
function GarmentCanvas({side,colour,logo,placement,onPlacementChange}){
  const containerRef=useRef(null);
  const isDragging=useRef(false);
  const isResizing=useRef(false);
  const dragStart=useRef({});
  const resizeStart=useRef({});

  const pz = side==="front"
    ? {x:62,y:55,w:76,h:90}
    : {x:62,y:50,w:76,h:90};

  const pl = placement || {x:pz.x+pz.w*0.15, y:pz.y+pz.h*0.15, w:pz.w*0.7, h:pz.h*0.7};

  const isLight=["#FFFFFF","#E8DFD0","#C8C4BC"].includes(colour);
  const stroke=isLight?"#CCCCCC":"transparent";

  const getScale=()=>{
    if(!containerRef.current)return{sx:1,sy:1};
    const{width,height}=containerRef.current.getBoundingClientRect();
    return{sx:width/200,sy:height/220};
  };

  const onMouseDownDrag=(e)=>{
    e.preventDefault();e.stopPropagation();
    isDragging.current=true;
    const{sx,sy}=getScale();
    dragStart.current={mx:e.clientX,my:e.clientY,lx:pl.x*sx,ly:pl.y*sy};
    const move=(ev)=>{
      if(!isDragging.current)return;
      const{sx:sx2,sy:sy2}=getScale();
      let nx=(dragStart.current.lx+(ev.clientX-dragStart.current.mx))/sx2;
      let ny=(dragStart.current.ly+(ev.clientY-dragStart.current.my))/sy2;
      nx=Math.max(pz.x,Math.min(pz.x+pz.w-pl.w,nx));
      ny=Math.max(pz.y,Math.min(pz.y+pz.h-pl.h,ny));
      onPlacementChange({...pl,x:nx,y:ny});
    };
    const up=()=>{isDragging.current=false;window.removeEventListener("mousemove",move);window.removeEventListener("mouseup",up);};
    window.addEventListener("mousemove",move);window.addEventListener("mouseup",up);
  };

  const onTouchDrag=(e)=>{
    e.preventDefault();e.stopPropagation();
    isDragging.current=true;
    const t=e.touches[0];
    const{sx,sy}=getScale();
    dragStart.current={mx:t.clientX,my:t.clientY,lx:pl.x*sx,ly:pl.y*sy};
    const move=(ev)=>{
      const t2=ev.touches[0];
      const{sx:sx2,sy:sy2}=getScale();
      let nx=(dragStart.current.lx+(t2.clientX-dragStart.current.mx))/sx2;
      let ny=(dragStart.current.ly+(t2.clientY-dragStart.current.my))/sy2;
      nx=Math.max(pz.x,Math.min(pz.x+pz.w-pl.w,nx));
      ny=Math.max(pz.y,Math.min(pz.y+pz.h-pl.h,ny));
      onPlacementChange({...pl,x:nx,y:ny});
    };
    const up=()=>{isDragging.current=false;window.removeEventListener("touchmove",move);window.removeEventListener("touchend",up);};
    window.addEventListener("touchmove",move,{passive:false});window.addEventListener("touchend",up);
  };

  const onMouseDownResize=(e)=>{
    e.preventDefault();e.stopPropagation();
    isResizing.current=true;
    const{sx}=getScale();
    resizeStart.current={mx:e.clientX,lw:pl.w*sx};
    const move=(ev)=>{
      if(!isResizing.current)return;
      const{sx:sx2}=getScale();
      let nw=(resizeStart.current.lw+(ev.clientX-resizeStart.current.mx))/sx2;
      nw=Math.max(10,Math.min(pz.x+pz.w-pl.x,nw));
      const nh=nw*(pl.h/pl.w);
      onPlacementChange({...pl,w:nw,h:Math.min(nh,pz.y+pz.h-pl.y)});
    };
    const up=()=>{isResizing.current=false;window.removeEventListener("mousemove",move);window.removeEventListener("mouseup",up);};
    window.addEventListener("mousemove",move);window.addEventListener("mouseup",up);
  };

  const onTouchResize=(e)=>{
    e.preventDefault();e.stopPropagation();
    isResizing.current=true;
    const t=e.touches[0];
    const{sx}=getScale();
    resizeStart.current={mx:t.clientX,lw:pl.w*sx};
    const move=(ev)=>{
      const t2=ev.touches[0];
      const{sx:sx2}=getScale();
      let nw=(resizeStart.current.lw+(t2.clientX-resizeStart.current.mx))/sx2;
      nw=Math.max(10,Math.min(pz.x+pz.w-pl.x,nw));
      const nh=nw*(pl.h/pl.w);
      onPlacementChange({...pl,w:nw,h:Math.min(nh,pz.y+pz.h-pl.y)});
    };
    const up=()=>{isResizing.current=false;window.removeEventListener("touchmove",move);window.removeEventListener("touchend",up);};
    window.addEventListener("touchmove",move,{passive:false});window.addEventListener("touchend",up);
  };

  const bodyPath=side==="front"
    ?"M55,20 L30,45 L5,38 L18,80 L40,75 L40,205 L160,205 L160,75 L182,80 L195,38 L170,45 L145,20 C140,28 130,35 100,35 C70,35 60,28 55,20 Z"
    :"M55,20 L30,45 L5,38 L18,80 L40,75 L40,205 L160,205 L160,75 L182,80 L195,38 L170,45 L145,20 C140,28 130,35 100,35 C70,35 60,28 55,20 Z";

  return(
    <div style={{position:"relative",userSelect:"none"}} ref={containerRef}>
      <svg viewBox="0 0 200 220" style={{width:"100%",display:"block"}}>
        <ellipse cx="100" cy="215" rx="70" ry="6" fill="rgba(0,0,0,0.06)"/>
        <path d={bodyPath} fill={colour} stroke={stroke} strokeWidth="1.5"/>
        <path d="M55,20 C60,28 70,35 100,35 C130,35 140,28 145,20" fill="none" stroke={stroke||"rgba(0,0,0,0.1)"} strokeWidth="2"/>
        <line x1="40" y1="75" x2="40" y2="205" stroke="rgba(0,0,0,0.06)" strokeWidth="1"/>
        <line x1="160" y1="75" x2="160" y2="205" stroke="rgba(0,0,0,0.06)" strokeWidth="1"/>

        {/* Print zone */}
        <rect x={pz.x} y={pz.y} width={pz.w} height={pz.h}
          fill="rgba(212,82,26,0.04)" stroke="rgba(212,82,26,0.3)" strokeWidth="1" strokeDasharray="5,3" rx="2"/>

        {logo?(
          <>
            <image href={logo.url} x={pl.x} y={pl.y} width={pl.w} height={pl.h}
              preserveAspectRatio="xMidYMid meet"
              style={{cursor:"move"}}
              onMouseDown={onMouseDownDrag} onTouchStart={onTouchDrag}/>
            <rect x={pl.x} y={pl.y} width={pl.w} height={pl.h} fill="none" stroke={T.accent} strokeWidth="1.5" strokeDasharray="4,2" rx="2" style={{pointerEvents:"none"}}/>
            <circle cx={pl.x+5} cy={pl.y+5} r="5" fill={T.accent} style={{pointerEvents:"none"}}/>
            <text x={pl.x+5} y={pl.y+9} textAnchor="middle" fontSize="6" fill="white" style={{pointerEvents:"none"}}>✥</text>
            <rect x={pl.x+pl.w-8} y={pl.y+pl.h-8} width="10" height="10" fill={T.accent} rx="2"
              style={{cursor:"se-resize"}} onMouseDown={onMouseDownResize} onTouchStart={onTouchResize}/>
            <text x={pl.x+pl.w-3} y={pl.y+pl.h-1} fontSize="7" fill="white" style={{pointerEvents:"none"}}>↔</text>
            <text x={pz.x+pz.w/2} y={pz.y-3} textAnchor="middle" fontSize="7" fill="rgba(212,82,26,0.7)" fontFamily="Segoe UI,sans-serif">DTF PRINT ZONE</text>
          </>
        ):(
          <text x={pz.x+pz.w/2} y={pz.y+pz.h/2+4} textAnchor="middle" fontSize="9" fill="rgba(212,82,26,0.5)" fontFamily="Segoe UI,sans-serif" fontWeight="600">
            Upload logo to place here
          </text>
        )}
        <text x="100" y="218" textAnchor="middle" fontSize="9" fill={T.muted} fontFamily="Segoe UI,sans-serif" fontWeight="600" letterSpacing="0.08em">
          {side==="front"?"FRONT":"BACK"}
        </text>
      </svg>
    </div>
  );
}

// ── ROOT APP ──────────────────────────────────────────────────────────────────
function App(){
  const[step,setStep]=useState("brand");
  const[submitted,setSubmitted]=useState(false);
  const[submitting,setSubmitting]=useState(false);
  const[submitErr,setSubmitErr]=useState("");
  const[cardReady,setCardReady]=useState(false);
  const cardRef=useRef(null);
  const cardMountRef=useRef(null);
  const stripeElements=useRef(null);

  // Mount Stripe card when payment step becomes active
  useEffect(()=>{
    if(step!=="payment")return;
    // Small delay to ensure DOM is rendered
    const timer=setTimeout(()=>{
      const mountEl=document.getElementById("stripe-card-mount");
      if(!mountEl)return;
      // Destroy previous instance if exists
      if(cardRef.current){
        try{cardRef.current.destroy();}catch(e){}
        cardRef.current=null;
        setCardReady(false);
      }
      const elements=getStripe().elements();
      const card=elements.create("card",{
        style:{base:{color:"#1A1714",fontFamily:"Segoe UI,sans-serif",fontSize:"15px","::placeholder":{color:"#8C8580"}},invalid:{color:"#D4521A"}},
      });
      card.mount(mountEl);
      card.on("change",e=>setCardReady(!e.empty&&!e.error));
      cardRef.current=card;
    },200);
    return()=>clearTimeout(timer);
  },[step]);

  const[brand,setBrand]=useState({brandName:"",tagline:"",category:""});
  const[contact,setContact]=useState({firstName:"",lastName:"",email:"",phone:"",street:"",suburb:"",state:"",postcode:"",country:"Australia"});
  const[bank,setBank]=useState({bank:"",accountName:"",bsb:"",accountNumber:""});
  const[planId,setPlanId]=useState("starter");
  const[design,setDesign]=useState({products:[],colours:"",sizes:[],placement:[],notes:""});

  const stepIdx=STEPS.findIndex(s=>s.id===step);
  const goNext=()=>{if(stepIdx<STEPS.length-1)setStep(STEPS[stepIdx+1].id);};
  const goBack=()=>{if(stepIdx>0)setStep(STEPS[stepIdx-1].id);};

  const canContinue=()=>{
    if(step==="brand")   return !!brand.brandName;
    if(step==="contact") return !!(contact.firstName&&contact.lastName&&contact.email&&contact.phone&&contact.street&&contact.suburb&&contact.state&&contact.postcode);
    if(step==="bank")    return !!(bank.bank&&bank.accountName&&bank.bsb&&bank.accountNumber);
    if(step==="plan")    return !!planId;
    if(step==="payment") return cardReady;
    return true;
  };

  const handleSubmit=async()=>{
    setSubmitting(true);setSubmitErr("");
    try{
      const plan=PLANS.find(p=>p.id===planId);
      // 1. Create Stripe payment method
      const{paymentMethod,error}=await getStripe().createPaymentMethod({
        type:"card",card:cardRef.current,
        billing_details:{email:contact.email,name:`${contact.firstName} ${contact.lastName}`},
      });
      if(error)throw new Error(error.message);

      // 2. Create Stripe subscription via Railway proxy
      const res=await fetch(PROXY+"/stripe/subscribe",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          email:contact.email,
          name:`${contact.firstName} ${contact.lastName}`,
          priceId:PRICE_IDS[planId],
          paymentMethodId:paymentMethod.id,
        }),
      });
      const subData=await res.json();
      if(!res.ok)throw new Error(subData.error||"Payment failed");

      // 3. Confirm if 3D Secure required
      if(subData.clientSecret){
        const{error:ce}=await getStripe().confirmCardPayment(subData.clientSecret);
        if(ce)throw new Error(ce.message);
      }

      // 4. Save vendor to Supabase
      const{data:vendor,error:ve}=await sb.from("vendors").insert({
        name:`${contact.firstName} ${contact.lastName}`,
        email:contact.email.toLowerCase().trim(),
        phone:contact.phone,
        brand_name:brand.brandName,
        store_name:brand.brandName,
        address:[contact.street,contact.suburb,contact.state,contact.postcode,contact.country].filter(Boolean).join(", "),
        bank:bank.bank,
        bsb:bank.bsb,
        account_number:bank.accountNumber,
        account_name:bank.accountName,
        plan:planId,
        payout_rate:plan.payout,
        status:"pending",
        notes:JSON.stringify({
          tagline:brand.tagline,
          category:brand.category,
          design,
          stripeCustomerId:subData.customerId,
        }),
      }).select().single();
      if(ve)throw new Error(ve.message);

      // 5. Save subscription to Supabase
      await sb.from("subscriptions").insert({
        vendor_id:vendor.id,
        plan:planId,
        price:plan.price,
        payout_rate:plan.payout,
        status:"active",
        stripe_subscription_id:subData.subscriptionId,
      });

      setSubmitted(true);
    }catch(e){
      setSubmitErr(e.message);
    }finally{
      setSubmitting(false);
    }
  };

  if(submitted)return <Success brandName={brand.brandName} planId={planId}/>;

  return(
    <>
      <style>{`* { box-sizing: border-box; margin: 0; padding: 0; } body { background: ${T.bg}; } ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: ${T.border}; border-radius: 2px; } select option { background: white; color: ${T.ink}; }`}</style>
      <div style={{background:T.bg,minHeight:"100vh",fontFamily:"'Segoe UI',sans-serif"}}>

        {/* Header */}
        <div style={{background:T.surface,borderBottom:`1.5px solid ${T.border}`,padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:50}}>
          <div>
            <p style={{fontFamily:"Georgia,serif",fontWeight:900,fontSize:17,color:T.ink}}>Merch on Demand</p>
            <p style={{color:T.muted,fontSize:10,fontWeight:500}}>Vendor Application</p>
          </div>
          <div style={{background:T.accentBg,border:`1.5px solid ${T.accentBorder}`,borderRadius:99,padding:"4px 14px"}}>
            <span style={{color:T.accent,fontSize:11,fontWeight:700}}>Step {stepIdx+1} of {STEPS.length}</span>
          </div>
        </div>

        {/* Progress */}
        <div style={{background:T.surface,borderBottom:`1.5px solid ${T.border}`,padding:"14px 24px 12px"}}>
          <ProgressBar step={step}/>
        </div>

        {/* Content */}
        <div style={{maxWidth:600,margin:"0 auto",padding:"28px 24px 80px"}}>
          {step==="brand"   &&<StepBrand   data={brand}   setData={setBrand}/>}
          {step==="contact" &&<StepContact data={contact} setData={setContact}/>}
          {step==="bank"    &&<StepBank    data={bank}    setData={setBank}/>}
          {step==="plan"    &&<StepPlan    selectedPlan={planId} onSelect={setPlanId}/>}
          {step==="payment" &&<StepPayment plan={planId} cardMountRef={cardMountRef}/>}
          {step==="design"  &&<StepDesign  data={design}  setData={setDesign}/>}
          {step==="review"  &&<StepReview  brand={brand} contact={contact} bank={bank} planId={planId} design={design}/>}

          {submitErr&&<div style={{background:"#FEE2E2",border:"1px solid #FCA5A5",borderRadius:10,padding:12,marginTop:16}}><p style={{color:"#991B1B",fontSize:13}}>⚠ {submitErr}</p></div>}

          {/* Nav buttons */}
          <div style={{display:"flex",gap:12,marginTop:30}}>
            {stepIdx>0&&<Btn outline onClick={goBack}>← Back</Btn>}
            {step==="review"
              ?<Btn onClick={handleSubmit} disabled={submitting} isLast>{submitting?<Spin/>:"✓ Submit & Pay"}</Btn>
              :<Btn onClick={goNext} disabled={!canContinue()}>Continue →</Btn>
            }
          </div>
        </div>
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
